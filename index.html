<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dabbable Meeting Bingo</title>
    <style>
        :root {
            --primary-color: #f07167;
            --secondary-color: #00afb9;
            --dab-color: #d8f3dc;
            /* Light green "dab" */
            --dab-border: #b7e4c7;
            --bg-card: #f8f9fa;
            --bg-free: #fed9b7;
            --border-color: #dee2e6;
            --text-color: #212529;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            text-align: center;
        }

        p {
            margin-top: 0;
            margin-bottom: 20px;
            color: #6c757d;
            text-align: center;
            max-width: 400px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #reroll-btn {
            background-color: var(--primary-color);
        }

        #reroll-btn:hover {
            background-color: #df5e54;
        }

        #reroll-btn:disabled {
            background-color: #e2a5a0;
            cursor: not-allowed;
        }

        /* "Play Mode" toggle button state */
        #play-mode-btn {
            background-color: #6c757d;
        }

        #play-mode-btn:hover {
            background-color: #5a6268;
        }

        #play-mode-btn.active {
            background-color: var(--secondary-color);
        }

        .bingo-container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            text-align: center;
            margin-bottom: 5px;
        }

        .header-letter {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .bingo-cell {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-card);
            height: 110px;
            /* Comfortably fits longer phrases */
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            line-height: 1.2;
            user-select: none;
            position: relative;
            cursor: not-allowed;
            /* By default, squares aren't clickable until play mode */
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Free Space always unlocked */
        .bingo-cell.free-space {
            border: 2px dashed var(--primary-color);
            background-color: var(--bg-free);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            /* Always clickable */
        }

        /* Active "Dabbing" style applied when cell is clicked in Play Mode */
        .bingo-cell.dabbed {
            background-color: var(--dab-color);
            border-color: var(--dab-border);
            font-weight: bold;
        }

        /* Enable interaction in Play Mode */
        body.play-mode-active .bingo-cell {
            cursor: pointer;
        }

        body.play-mode-active .bingo-cell:hover:not(.dabbed) {
            background-color: #f1f3f5;
        }
    </style>
</head>

<body>

    <h1>🎲 Dabbable Meeting Bingo</h1>
    <p>1. Generate a card. 2. Lock it to activate "Play Mode." 3. "Dab" squares during the meeting!</p>

    <div class="button-group">
        <button id="reroll-btn">🔄 New Card</button>
        <button id="play-mode-btn">🔒 Play / Lock Card</button>
    </div>

    <div class="bingo-container">
        <div class="header-row">
            <div class="header-letter">B</div>
            <div class="header-letter">I</div>
            <div class="header-letter">N</div>
            <div class="header-letter">G</div>
            <div class="header-letter">O</div>
        </div>
        <div id="grid" class="bingo-grid"></div>
    </div>

    <script>
        const JARGON_POOL = [
            "Someone leans in and whispers to their neighbor",
            "Loud pen clicking or tapping",
            "Let's take this offline.",
            "Awkward silence after a question",
            "Someone struggles with the meeting room tech/projector",
            "A phone vibrates loudly on the hard table",
            "Synergy / Paradigm shift",
            "Someone sneaks a look at their phone under the table",
            "Awkward eye contact across the room",
            "Two people talk over each other trying to jump in",
            "We're just waiting on a few more people to arrive.",
            "Let's pivot.",
            "Someone walks in late and does the apologetic wave",
            "Someone is clearly doodling on their notepad",
            "Touch base",
            "Can everyone see the screen? (Pointing to projector)",
            "Let's circle back to that.",
            "The room temperature is debated (too hot / too cold)",
            "I'll give you back X minutes of your day.",
            "Moving the needle",
            "Low-hanging fruit",
            "Quick temperature check?",
            "Someone brought snacks or coffee for themselves only",
            "Let's un-pack that.",
            "Comfort break / Bio-break",
            "Let's put a pin in that.",
            "Value add",
            "At the end of the day",
            "Deep dive",
            "Someone opens/closes a window or adjusts the blinds"
        ];

        let playModeActive = false;

        function shuffleAndGenerate() {
            if (playModeActive) return; // Prevent new cards while playing

            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';

            let poolCopy = [...JARGON_POOL];
            for (let i = poolCopy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [poolCopy[i], poolCopy[j]] = [poolCopy[j], poolCopy[i]];
            }

            let selectedItems = poolCopy.slice(0, 24);
            selectedItems.splice(12, 0, "FREE SPACE");

            selectedItems.forEach((text, index) => {
                const cell = document.createElement('div');
                cell.classList.add('bingo-cell');

                if (text === "FREE SPACE") {
                    cell.innerHTML = "✨ FREE SPACE ✨";
                    cell.classList.add('free-space');
                    cell.classList.add('dabbed'); // Start dabbed
                } else {
                    cell.textContent = text;
                }

                // Add click listener to handle dabbing
                cell.addEventListener('click', () => handleCellDab(cell));
                gridContainer.appendChild(cell);
            });
        }

        // Handle applying/removing the "dab" effect
        function handleCellDab(cell) {
            // Only allow dabbing/undabbing if we are in play mode,
            // OR if it's the free space (which is always allowed).
            if (playModeActive || cell.classList.contains('free-space')) {
                cell.classList.toggle('dabbed');
            }
        }

        // Toggle game state between "Generate" and "Play" modes
        function togglePlayMode() {
            playModeActive = !playModeActive;

            const rerollBtn = document.getElementById('reroll-btn');
            const playBtn = document.getElementById('play-mode-btn');
            const body = document.body;

            if (playModeActive) {
                rerollBtn.disabled = true;
                playBtn.innerHTML = '🔓 Playing... (Unlock)';
                playBtn.classList.add('active');
                body.classList.add('play-mode-active');
                // Optional: Clear any accidental dabs before game starts
                clearDabsExceptFreeSpace();
            } else {
                rerollBtn.disabled = false;
                playBtn.innerHTML = '🔒 Play / Lock Card';
                playBtn.classList.remove('active');
                body.classList.remove('play-mode-active');
            }
        }

        // Clear all dabs, resetting only the free space to marked
        function clearDabsExceptFreeSpace() {
            const cells = document.querySelectorAll('.bingo-cell');
            cells.forEach(cell => {
                if (cell.classList.contains('free-space')) {
                    cell.classList.add('dabbed'); // keep free space dabbed
                } else {
                    cell.classList.remove('dabbed'); // clear other dabs
                }
            });
        }

        // Event listeners
        document.getElementById('reroll-btn').addEventListener('click', shuffleAndGenerate);
        document.getElementById('play-mode-btn').addEventListener('click', togglePlayMode);

        // Initial grid generation
        window.addEventListener('DOMContentLoaded', shuffleAndGenerate);
    </script>
</body>

</html>
