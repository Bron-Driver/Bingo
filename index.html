<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Meeting & Icebreaker Bingo</title>
    <style>
        :root {
            --bg-body: #ffffff;
            --bg-container: #ffffff;
            --text-main: #212529;
            --text-sub: #6c757d;
            --border-color: #dee2e6;
            --bg-card: #f8f9fa;

            --primary-color: #f07167;
            --secondary-color: #00afb9;
            --dab-color: #d8f3dc;
            --dab-border: #b7e4c7;
            --bg-free: #fed9b7;
            --text-free: #212529;
            --text-dab: #1b4332;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --text-main: #f8f9fa;
            --text-sub: #a0a0a0;
            --border-color: #333333;
            --bg-card: #252525;

            --dab-color: #1b4332;
            --dab-border: #2d6a4f;
            --text-dab: #d8f3dc;
            --bg-free: #4a2810;
            --text-free: #ffddd2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 600px;
            margin-bottom: 15px;
            gap: 15px;
        }

        .menu-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        select {
            padding: 6px 12px;
            font-size: 0.9rem;
            border-radius: 5px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            font-weight: bold;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 2rem;
            text-align: center;
        }

        p {
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-sub);
            text-align: center;
            max-width: 450px;
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #theme-toggle {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            font-size: 0.9rem;
        }

        #theme-toggle:hover {
            background-color: var(--bg-card);
        }

        #reroll-btn {
            background-color: var(--primary-color);
        }

        #reroll-btn:hover {
            background-color: #df5e54;
        }

        #reroll-btn:disabled {
            background-color: #e2a5a0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #play-mode-btn {
            background-color: #6c757d;
        }

        #play-mode-btn:hover {
            background-color: #5a6268;
        }

        #play-mode-btn.active {
            background-color: var(--secondary-color);
        }

        .bingo-container {
            background-color: var(--bg-container);
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            transition: background-color 0.3s;
        }

        /* Dynamic Prompt Banner above the grid */
        .prompt-banner {
            display: none;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 15px;
            padding: 8px;
            background-color: var(--bg-card);
            border-radius: 6px;
            border: 1px dashed var(--border-color);
        }

        .header-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            text-align: center;
            margin-bottom: 5px;
        }

        .header-letter {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .bingo-cell {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-card);
            height: 115px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.8rem;
            line-height: 1.2;
            user-select: none;
            position: relative;
            cursor: not-allowed;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .bingo-cell.free-space {
            border: 2px dashed var(--primary-color);
            background-color: var(--bg-free);
            color: var(--text-free);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .bingo-cell.dabbed {
            background-color: var(--dab-color);
            border-color: var(--dab-border);
            color: var(--text-dab);
            font-weight: bold;
        }

        body.play-mode-active .bingo-cell {
            cursor: pointer;
        }

        body.play-mode-active .bingo-cell:hover:not(.dabbed) {
            background-color: var(--border-color);
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="menu-group">
            <label for="card-type" style="font-weight: bold; font-size: 0.9rem;">Game Mode:</label>
            <select id="card-type">
                <option value="jargon">Boardroom Jargon</option>
                <option value="icebreaker">Icebreaker</option>
            </select>
        </div>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </div>

    <h1 id="game-title">🎲 Dabbable Meeting Bingo</h1>
    <p id="game-instructions">1. Generate a card. 2. Lock it to activate "Play Mode." 3. "Dab" squares during the
        meeting!</p>

    <div class="button-group">
        <button id="reroll-btn">🔄 New Card</button>
        <button id="play-mode-btn">🔒 Play / Lock Card</button>
    </div>

    <div class="bingo-container">
        <!-- New Instruction Banner located right inside the container card -->
        <div id="prompt-banner" class="prompt-banner">🔍 Find someone who...</div>

        <div class="header-row">
            <div class="header-letter">B</div>
            <div class="header-letter">I</div>
            <div class="header-letter">N</div>
            <div class="header-letter">G</div>
            <div class="header-letter">O</div>
        </div>
        <div id="grid" class="bingo-grid"></div>
    </div>

    <script>
        const DECK_POOLS = {
            jargon: [
                "Someone leans in and whispers to their neighbor",
                "Loud pen clicking or tapping",
                "Let's take this offline.",
                "Awkward silence after a question",
                "Someone struggles with the meeting room tech/projector",
                "A phone vibrates loudly on the hard table",
                "Synergy / Paradigm shift",
                "Someone sneaks a look at their phone under the table",
                "Awkward eye contact across the room",
                "Two people talk over each other trying to jump in",
                "We're just waiting on a few more people to arrive.",
                "Let's pivot.",
                "Someone walks in late and does the apologetic wave",
                "Someone is clearly doodling on their notepad",
                "Touch base",
                "Can everyone see the screen? (Pointing to projector)",
                "Let's circle back to that.",
                "The room temperature is debated (too hot / too cold)",
                "I'll give you back X minutes of your day.",
                "Moving the needle",
                "Low-hanging fruit",
                "Quick temperature check?",
                "Someone brought snacks or coffee for themselves only",
                "Let's un-pack that.",
                "Comfort break / Bio-break",
                "Let's put a pin in that.",
                "Value add",
                "At the end of the day",
                "Deep dive",
                "Someone opens/closes a window or adjusts the blinds"
            ],
            icebreaker: [
                "Has a pet that isn't a cat or a dog",
                "Speaks more than one language fluently",
                "Has run a marathon or a half-marathon",
                "Has a tattoo",
                "Is left-handed",
                "Born in a different country",
                "Can play a musical instrument",
                "Has never broken a bone",
                "Loves pineapple on pizza",
                "Has met a celebrity",
                "Prefers tea over coffee",
                "Has a winter birthday (Dec - Feb)",
                "Has worked here for more than 5 years",
                "Travelled outside the country this past year",
                "Is wearing something blue today",
                "Knows how to knit or crochet",
                "Has been scuba diving or skydiving",
                "Is the oldest or an only child",
                "Has baked their own bread from scratch",
                "Can whistle loudly using their fingers",
                "Owns a vintage camera or vinyl record player",
                "Has stayed up all night to finish a book or video game",
                "Doesn't drink coffee at all",
                "Can juggle three or more objects",
                "Has a collection of something unusual",
                "Prefers a physical book over an e-reader",
                "Has successfully kept a houseplant alive for over a year",
                "Has been to a music festival"
            ]
        };

        let playModeActive = false;

        function shuffleAndGenerate() {
            if (playModeActive) return;

            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';

            const selectedDeck = document.getElementById('card-type').value;
            let poolCopy = [...DECK_POOLS[selectedDeck]];

            for (let i = poolCopy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [poolCopy[i], poolCopy[j]] = [poolCopy[j], poolCopy[i]];
            }

            let selectedItems = poolCopy.slice(0, 24);
            selectedItems.splice(12, 0, "FREE SPACE");

            selectedItems.forEach((text) => {
                const cell = document.createElement('div');
                cell.classList.add('bingo-cell');

                if (text === "FREE SPACE") {
                    cell.innerHTML = "✨ FREE SPACE ✨";
                    cell.classList.add('free-space');
                    cell.classList.add('dabbed');
                } else {
                    cell.textContent = text; // Clean layout without repeating html formatting
                }

                cell.addEventListener('click', () => handleCellDab(cell));
                gridContainer.appendChild(cell);
            });
        }

        function handleCellDab(cell) {
            if (playModeActive || cell.classList.contains('free-space')) {
                cell.classList.toggle('dabbed');
            }
        }

        function togglePlayMode() {
            playModeActive = !playModeActive;
            const rerollBtn = document.getElementById('reroll-btn');
            const playBtn = document.getElementById('play-mode-btn');
            const menuSelect = document.getElementById('card-type');
            const body = document.body;

            if (playModeActive) {
                rerollBtn.disabled = true;
                menuSelect.disabled = true;
                playBtn.innerHTML = '🔓 Playing... (Unlock)';
                playBtn.classList.add('active');
                body.classList.add('play-mode-active');
                clearDabsExceptFreeSpace();
            } else {
                rerollBtn.disabled = false;
                menuSelect.disabled = false;
                playBtn.innerHTML = '🔒 Play / Lock Card';
                playBtn.classList.remove('active');
                body.classList.remove('play-mode-active');
            }
        }

        function clearDabsExceptFreeSpace() {
            const cells = document.querySelectorAll('.bingo-cell');
            cells.forEach(cell => {
                if (cell.classList.contains('free-space')) {
                    cell.classList.add('dabbed');
                } else {
                    cell.classList.remove('dabbed');
                }
            });
        }

        function updateUIModeText() {
            const selectedDeck = document.getElementById('card-type').value;
            const title = document.getElementById('game-title');
            const instructions = document.getElementById('game-instructions');
            const banner = document.getElementById('prompt-banner');

            if (selectedDeck === 'icebreaker') {
                title.innerHTML = "🎲 Icebreaker Bingo";
                instructions.innerHTML = "1. Roll a card. 2. Lock it. 3. Chat around the room to fill your board!";
                banner.style.display = "block"; // Show "Find someone who..." banner
            } else {
                title.innerHTML = "🎲 Boardroom Bingo";
                instructions.innerHTML = "1. Roll a card. 2. Lock it. 3. Watch the room closely and tap squares live!";
                banner.style.display = "none";  // Hide banner
            }
            shuffleAndGenerate();
        }

        // Theme Toggle
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggle.innerHTML = '🌙 Dark Mode';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '☀️ Light Mode';
            }
        });

        document.getElementById('card-type').addEventListener('change', updateUIModeText);
        document.getElementById('reroll-btn').addEventListener('click', shuffleAndGenerate);
        document.getElementById('play-mode-btn').addEventListener('click', togglePlayMode);
        window.addEventListener('DOMContentLoaded', shuffleAndGenerate);
    </script>
</body>

</html>
