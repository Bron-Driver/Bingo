<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Meeting & Icebreaker Bingo</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-card-default: #f8f9fa;
            --text-cell: #212529;
            --bg-free: #fed9b7;
            --text-free: #212529;
            --border-free: #f07167;
            --bg-dabbed: #d8f3dc;
            --text-dabbed: #1b4332;
            --border-dabbed: #b7e4c7;
            --bg-board: #ffffff;
            /* Light mode main board background */
        }

        [data-theme="dark"] {
            --bg-card-default: #2b2b2b;
            --text-cell: #f8f9fa;
            --bg-free: #4a2810;
            --text-free: #ffddd2;
            --border-free: #f07167;
            --bg-dabbed: #1b4332;
            --text-dabbed: #d8f3dc;
            --border-dabbed: #2d6a4f;
            --bg-board: #1e1e1e;
            /* Dark mode main board background */
        }

        body {
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
        }

        /* Forces the main container card to properly respect the theme */
        .main-bingo-card {
            background-color: var(--bg-board) !important;
            transition: background-color 0.3s;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .bingo-cell {
            background-color: var(--bg-card-default);
            color: var(--text-cell);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: calc(0.5rem + 0.35vw);
            line-height: 1.2;
            padding: 6px;
            user-select: none;
            cursor: not-allowed;
            transition: all 0.2s ease;
            border: 1px solid var(--bs-border-color);
            min-width: 0;
            overflow: hidden;
            word-break: break-word;
        }

        @media (max-width: 576px) {
            .bingo-cell {
                font-size: calc(0.4rem + 0.45vw);
                padding: 4px;
            }
        }

        .bingo-cell.free-space {
            border: 2px dashed var(--border-free) !important;
            background-color: var(--bg-free) !important;
            color: var(--text-free) !important;
            font-weight: bold;
            cursor: pointer;
        }

        .bingo-cell.dabbed {
            background-color: var(--bg-dabbed) !important;
            border-color: var(--border-dabbed) !important;
            color: var(--text-dabbed) !important;
            font-weight: bold;
        }

        body.play-mode-active .bingo-cell {
            cursor: pointer;
        }

        body.play-mode-active .bingo-cell:hover:not(.dabbed) {
            filter: brightness(0.9);
        }
    </style>
</head>

<body class="bg-light text-dark">

    <div class="container py-4" style="max-width: 650px;">
        <!-- Top Toolbar Header Section -->
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div class="d-flex align-items-center gap-2">
                <label for="card-type" class="form-label mb-0 fw-bold small text-secondary">Mode:</label>
                <select id="card-type" class="form-select form-select-sm fw-bold border-secondary-subtle">
                    <option value="jargon">Boardroom Jargon</option>
                    <option value="icebreaker">Icebreaker</option>
                </select>
            </div>
            <button id="theme-toggle" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-2">
                <i class="bi bi-moon-stars"></i> <span>Dark Mode</span>
            </button>
        </div>

        <!-- Heading Text Section -->
        <div class="text-center mb-4">
            <h1 id="game-title" class="display-6 fw-bold text-primary mb-1">🎲 Boardroom Bingo</h1>
            <p id="game-instructions" class="small text-secondary mx-auto" style="max-width: 450px;">
                1. Roll a card. 2. Lock it to activate "Play Mode." 3. Watch the room closely and tap squares live!
            </p>
        </div>

        <!-- System Action Buttons Control Bar -->
        <div class="d-flex justify-content-center gap-2 mb-4">
            <button id="reroll-btn" class="btn btn-danger fw-bold d-flex align-items-center gap-2 px-4 shadow-sm">
                <i class="bi bi-shuffle"></i> New Card
            </button>
            <button id="play-mode-btn" class="btn btn-secondary fw-bold d-flex align-items-center gap-2 px-4 shadow-sm">
                <i class="bi bi-lock-fill"></i> Play / Lock Card
            </button>
        </div>

        <!-- Main Card Canvas Interface Wrapper -->
        <div class="card main-bingo-card shadow-sm border-0 p-3 p-sm-4 text-body">
            <!-- Dynamic Subtitle Context Instruction Banner -->
            <div id="prompt-banner" class="alert alert-info text-center py-2 fw-bold mb-3 shadow-sm border-0 d-none">
                <i class="bi bi-search me-1"></i> Find someone who...
            </div>

            <!-- Standard Header Alphabetic Row Structure using the same grid wrapper -->
            <div class="bingo-grid text-center mb-2 text-danger fw-bold fs-3">
                <div>B</div>
                <div>I</div>
                <div>N</div>
                <div>G</div>
                <div>O</div>
            </div>

            <!-- Programmatic Input Target Node Injection Area -->
            <div id="grid" class="bingo-grid"></div>
        </div>
    </div>

    <!-- Bootstrap 5 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const DECK_POOLS = {
            jargon: [
                "Someone leans in and whispers to their neighbor",
                "Loud pen clicking or tapping",
                "Let's take this offline.",
                "Awkward silence after a question",
                "Someone struggles with the meeting room tech/projector",
                "A phone vibrates loudly on the hard table",
                "Synergy / Paradigm shift",
                "Someone sneaks a look at their phone under the table",
                "Awkward eye contact across the room",
                "Two people talk over each other trying to jump in",
                "We're just waiting on a few more people to arrive.",
                "Let's pivot.",
                "Someone walks in late and does the apologetic wave",
                "Someone is clearly doodling on their notepad",
                "Touch base",
                "Can everyone see the screen? (Pointing to projector)",
                "Let's circle back to that.",
                "The room temperature is debated (too hot / too cold)",
                "I'll give you back X minutes of your day.",
                "Moving the needle",
                "Low-hanging fruit",
                "Quick temperature check?",
                "Someone brought snacks or coffee for themselves only",
                "Let's un-pack that.",
                "Comfort break / Bio-break",
                "Let's put a pin in that.",
                "Value add",
                "At the end of the day",
                "Deep dive",
                "Someone opens/closes a window or adjusts the blinds",
                "Heavy sigh from across the room",
                "Someone is aggressively typing on a laptop",
                "\"Think outside the box\"",
                "\"Win-win situation\"",
                "Someone leaves the room to take a call",
                "\"Get our ducks in a row\"",
                "\"Boil the ocean\"",
                "\"Run it up the flagpole\"",
                "Someone brings up a point that was covered 5 minutes ago",
                "\"On my radar\"",
                "\"Slam dunk\"",
                "A marker pen runs out of ink on the whiteboard",
                "\"Keep me in the loop\"",
                "\"Best practice\"",
                "Someone adjustments their chair height mid-discussion",
                "\"Buy-in from stakeholders\"",
                "\"Across the board\"",
                "An ambulance/siren blares past outside the window",
                "\"It is what it is\"",
                "\"Game changer\"",
                "Someone check their physical watch or clock on the wall",
                "\"Take ownership\"",
                "\"Bandwidth issues\" (meaning workload)",
                "Someone drinks water very loudly",
                "\"Hit the ground running\"",
                "\"helicopter view\"",
                "\"No-brainer\"",
                "Someone clears their throat dramatically",
                "\"Action items\"",
                "\"All hands on deck\"",
                "\"Wheelhouse\"",
                "Someone starts packing up their things early",
                "\"Back to the drawing board\"",
                "\"Core competency\"",
                "Someone leans all the way back in their chair"
            ],
            icebreaker: [
                "Has a pet that isn't a cat or a dog",
                "Speaks more than one language fluently",
                "Has run a marathon or a half-marathon",
                "Has a tattoo",
                "Is left-handed",
                "Born in a different country",
                "Can play a musical instrument",
                "Has never broken a bone",
                "Loves pineapple on pizza",
                "Has met a celebrity",
                "Prefers tea over coffee",
                "Has a winter birthday (Dec - Feb)",
                "Has worked here for more than 5 years",
                "Travelled outside the country this past year",
                "Is wearing something blue today",
                "Knows how to knit or crochet",
                "Has been scuba diving or skydiving",
                "Is the oldest or an only child",
                "Has baked their own bread from scratch",
                "Can whistle loudly using their fingers",
                "Owns a vintage camera or vinyl record player",
                "Has stayed up all night to finish a book or video game",
                "Doesn't drink coffee at all",
                "Can juggle three or more objects",
                "Has a collection of something unusual",
                "Prefers a physical book over an e-reader",
                "Has successfully kept a houseplant alive for over a year",
                "Has been to a music festival",
                "Has lived in more than 3 different cities",
                "Can name all 5 Great Lakes",
                "Has never seen a Star Wars movie",
                "Can cook a signature dish without a recipe",
                "Prefers savory snacks over sweet treats",
                "Has done a bungee jump",
                "Has a summer birthday (Jun - Aug)",
                "Woke up before 6:00 AM today",
                "Has an allotment or vegetable garden",
                "Can successfully perform a magic trick",
                "Has read more than 10 books this year",
                "Has been on television or radio",
                "Prefers early mornings over late nights",
                "Owns more than 5 pairs of sneakers/trainers",
                "Has visited at least 3 different continents",
                "Doesn't have any social media accounts on their phone",
                "Has a twin or has twin relatives",
                "Is wearing a watch today",
                "Can trace their ancestry back over 200 years",
                "Has camped in a tent in the rain",
                "Has built a piece of flat-pack furniture this month",
                "Knows sign language or Morse code",
                "Has a library card",
                "Can name the current top track on the music charts",
                "Has a hidden creative talent (painting, writing, etc.)",
                "Has never had a cavity/filling",
                "Has been to a professional sports game this year",
                "Drinks more than 2 liters of water a day",
                "Knows how to change a tire on a car",
                "Has seen a play or musical in a theater recently",
                "Has a collection of board games",
                "Prefers spicy food over mild food",
                "Has built a website or an application before",
                "Can cross their eyes on command"
            ]
        };

        let playModeActive = false;

        function shuffleAndGenerate() {
            if (playModeActive) return;

            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';

            const selectedDeck = document.getElementById('card-type').value;
            let poolCopy = [...DECK_POOLS[selectedDeck]];

            for (let i = poolCopy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [poolCopy[i], poolCopy[j]] = [poolCopy[j], poolCopy[i]];
            }

            let selectedItems = poolCopy.slice(0, 24);
            selectedItems.splice(12, 0, "FREE SPACE");

            selectedItems.forEach((text) => {
                const cell = document.createElement('div');
                cell.classList.add('bingo-cell', 'rounded', 'shadow-sm');

                if (text === "FREE SPACE") {
                    cell.innerHTML = "✨ FREE SPACE ✨";
                    cell.classList.add('free-space');
                    cell.classList.add('dabbed');
                } else {
                    cell.textContent = text;
                }

                cell.addEventListener('click', () => handleCellDab(cell));
                gridContainer.appendChild(cell);
            });
        }

        function handleCellDab(cell) {
            if (playModeActive || cell.classList.contains('free-space')) {
                cell.classList.toggle('dabbed');
            }
        }

        function togglePlayMode() {
            playModeActive = !playModeActive;
            const rerollBtn = document.getElementById('reroll-btn');
            const playBtn = document.getElementById('play-mode-btn');
            const menuSelect = document.getElementById('card-type');

            if (playModeActive) {
                rerollBtn.disabled = true;
                menuSelect.disabled = true;
                playBtn.innerHTML = '<i class="bi bi-unlock-fill"></i> Playing...';
                playBtn.classList.replace('btn-secondary', 'btn-info');
                playBtn.classList.add('text-white');
                document.body.classList.add('play-mode-active');
                clearDabsExceptFreeSpace();
            } else {
                rerollBtn.disabled = false;
                menuSelect.disabled = false;
                playBtn.innerHTML = '<i class="bi bi-lock-fill"></i> Play / Lock Card';
                playBtn.classList.replace('btn-info', 'btn-secondary');
                playBtn.classList.remove('text-white');
                document.body.classList.remove('play-mode-active');
            }
        }

        function clearDabsExceptFreeSpace() {
            const cells = document.querySelectorAll('.bingo-cell');
            cells.forEach(cell => {
                if (cell.classList.contains('free-space')) {
                    cell.classList.add('dabbed');
                } else {
                    cell.classList.remove('dabbed');
                }
            });
        }

        function updateUIModeText() {
            const selectedDeck = document.getElementById('card-type').value;
            const title = document.getElementById('game-title');
            const instructions = document.getElementById('game-instructions');
            const banner = document.getElementById('prompt-banner');

            if (selectedDeck === 'icebreaker') {
                title.innerHTML = "🎲 Icebreaker Bingo";
                instructions.innerHTML = "1. Roll a card. 2. Lock it. 3. Chat around the room to fill your board!";
                banner.classList.remove('d-none');
            } else {
                title.innerHTML = "🎲 Boardroom Bingo";
                instructions.innerHTML = "1. Roll a card. 2. Lock it. 3. Watch the room closely and tap squares live!";
                banner.classList.add('d-none');
            }
            shuffleAndGenerate();
        }

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                document.body.classList.replace('bg-dark', 'bg-light');
                document.body.classList.replace('text-white', 'text-dark');
                themeToggle.innerHTML = '<i class="bi bi-moon-stars"></i> <span>Dark Mode</span>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.body.classList.replace('bg-light', 'bg-dark');
                document.body.classList.replace('text-dark', 'text-white');
                themeToggle.innerHTML = '<i class="bi bi-sun-fill"></i> <span>Light Mode</span>';
            }
        });

        document.getElementById('card-type').addEventListener('change', updateUIModeText);
        document.getElementById('reroll-btn').addEventListener('click', shuffleAndGenerate);
        document.getElementById('play-mode-btn').addEventListener('click', togglePlayMode);
        window.addEventListener('DOMContentLoaded', shuffleAndGenerate);
    </script>
</body>

</html>
